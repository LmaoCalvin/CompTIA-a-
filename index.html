function App() {
  const [view, setView] = useState("home");
  const [mode, setMode] = useState(null);
  const [domainFilter, setDomainFilter] = useState(null);
  const [qs, setQs] = useState([]);
  const [qi, setQi] = useState(0);
  const [pick, setPick] = useState(null);
  const [locked, setLocked] = useState(false);
  const [showExp, setShowExp] = useState(false);
  const [guessed, setGuessed] = useState(false);
  const [guessComment, setGuessComment] = useState("");
  const [optOrder, setOptOrder] = useState([0,1,2,3]);
  const [sizePickerDomain, setSizePickerDomain] = useState(null);
  const [sessionResults, setSessionResults] = useState([]);
  const [timer, setTimer] = useState(0);
  const [ticking, setTicking] = useState(false);
  const [prog, setProg] = useState(function() { return loadProgress() || FRESH; });
  const tick = useRef(null);
  const sessionResultsRef = useRef([]);

  /* Cloud sync state */
  const [syncToken, setSyncToken] = useState(function() { return getGistToken(); });
  const [syncStatus, setSyncStatus] = useState("idle"); /* idle | syncing | synced | error */
  const [syncMsg, setSyncMsg] = useState("");
  const [showSyncSetup, setShowSyncSetup] = useState(false);
  const [tokenInput, setTokenInput] = useState("");

  function doSync(localProg) {
    if (!syncToken) return;
    setSyncStatus("syncing"); setSyncMsg("Syncing...");
    var gistId = getGistId();
    (gistId ? Promise.resolve(gistId) : findExistingGist(syncToken))
      .then(function(id) { return id ? gistPull(syncToken, id) : null; })
      .then(function(remote) {
        var merged = mergeProgress(localProg || prog, remote);
        setProg(merged); saveProgress(merged);
        return gistPush(syncToken, getGistId(), merged);
      })
      .then(function() { setSyncStatus("synced"); setSyncMsg("Synced just now"); })
      .catch(function(e) { setSyncStatus("error"); setSyncMsg(e.message || "Sync failed"); });
  }

  function connectSync() {
    var token = tokenInput.trim();
    if (!token) return;
    setSyncStatus("syncing"); setSyncMsg("Connecting...");
    setGistToken(token); setSyncToken(token);
    findExistingGist(token)
      .then(function(id) { return id ? gistPull(token, id) : null; })
      .then(function(remote) {
        var local = loadProgress() || FRESH;
        var merged = mergeProgress(local, remote);
        setProg(merged); saveProgress(merged);
        return gistPush(token, getGistId(), merged);
      })
      .then(function() {
        setSyncStatus("synced"); setSyncMsg("Connected & synced!");
        setShowSyncSetup(false); setTokenInput("");
      })
      .catch(function(e) {
        setSyncStatus("error"); setSyncMsg("Failed: " + (e.message || "check your token"));
        setGistToken(""); setSyncToken("");
      });
  }

  function disconnectSync() {
    setGistToken(""); setSyncToken(""); setSyncStatus("idle"); setSyncMsg(""); setShowSyncSetup(false);
    try { localStorage.removeItem("comptia-gist-token"); localStorage.removeItem("comptia-gist-id"); } catch(e) {}
  }

  /* Auto-sync on load if token is set */
  useEffect(function() {
    if (syncToken) doSync(loadProgress() || FRESH);
  }, []);

  const save = useCallback(function(p) {
    setProg(p);
    saveProgress(p);
    /* Auto-push to cloud after each save */
    var token = getGistToken();
    if (token) {
      gistPush(token, getGistId(), p).catch(function(e) { console.error("Cloud sync failed:", e); });
    }
  }, []);

  useEffect(function() {
    if (ticking) tick.current = setInterval(function() { setTimer(function(t) { return t - 1; }); }, 1000);
    return function() { clearInterval(tick.current); };
  }, [ticking]);

  useEffect(function() {
    if (timer <= 0 && ticking) { setTicking(false); finishWith(sessionResultsRef.current); }
  }, [timer, ticking]);

  function initOptOrder(questionsList) {
    if (questionsList.length > 0) {
      setOptOrder(shuffle(questionsList[0].o.map(function(_, i) { return i; })));
    }
  }

  /* baseline diagnostic removed */

  function startStudy(domain, size) {
    var sz = size || 15;
    const pool = domain ? QUESTIONS.filter(function(q) { return q.d === domain; }) : QUESTIONS;
    var picked = pickRotated(pool, Math.min(pool.length, sz));
    setQs(picked); initOptOrder(picked);
    setQi(0); setPick(null); setLocked(false); setShowExp(false); setGuessed(false); setGuessComment("");
    setSessionResults([]); sessionResultsRef.current = []; setMode("study"); setDomainFilter(domain);
    setSizePickerDomain(null); setView("quiz");
  }

  function startExam() {
    var picked = pickRotated(QUESTIONS, Math.min(QUESTIONS.length, 60));
    setQs(picked); initOptOrder(picked);
    setQi(0); setPick(null); setLocked(false); setShowExp(false); setGuessed(false); setGuessComment("");
    setSessionResults([]); sessionResultsRef.current = []; setMode("exam"); setDomainFilter(null);
    setSizePickerDomain(null); setTimer(60*60); setTicking(true); setView("quiz");
  }

  function answer(i) {
    if (locked) return;
    setPick(i); setLocked(true); setGuessed(false); setGuessComment("");
    if (mode === "study") setShowExp(true);
  }

  function next() {
    const q = qs[qi];
    const isCorrect = optOrder[pick] === q.c;
    const result = { id:q.id, d:q.d, correct:isCorrect, picked:optOrder[pick], guessed:guessed, comment: guessComment.trim() ? guessComment.trim() : null };
    const newResults = [...sessionResults, result];
    setSessionResults(newResults);
    sessionResultsRef.current = newResults;

    if (qi + 1 >= qs.length) { setTicking(false); finishWith(newResults); }
    else {
      var nextQ = qs[qi + 1];
      setOptOrder(shuffle(nextQ.o.map(function(_, i) { return i; })));
      setQi(function(n) { return n+1; }); setPick(null); setLocked(false); setShowExp(false); setGuessed(false); setGuessComment("");
    }
  }

  function finishWith(results) {
    setTicking(false);
    const p = JSON.parse(JSON.stringify(prog));
    if (p.guessed === undefined) p.guessed = 0;
    DOMAINS.forEach(function(d) { if (p.ds[d.id].g === undefined) p.ds[d.id].g = 0; });

    results.forEach(function(r) {
      p.total++; if(r.correct) p.correct++; if(r.guessed) p.guessed++;
      p.ds[r.d].a++; if(r.correct) p.ds[r.d].c++; if(r.guessed) p.ds[r.d].g++;
    });
    if (mode === "exam") {
      const c = results.filter(function(r) { return r.correct; }).length;
      const t = results.length;
      const g = results.filter(function(r) { return r.guessed; }).length;
      const score = Math.round((c/Math.max(t,1))*900);
      p.exams.push({ date: new Date().toLocaleDateString(), score:score, c:c, t:t, g:g, pass: score >= 675 });
    }
    const g = results.filter(function(r) { return r.guessed; }).length;
    p.sessions.push({ date: new Date().toLocaleDateString(), mode:mode, domain: domainFilter, total: results.length, correct: results.filter(function(r) { return r.correct; }).length, guessed: g, results: results });
    save(p);
    setSessionResults(results);
    setView("results");
  }

  function resetAll() {
    if (confirm("Reset ALL progress? This can't be undone.")) save(FRESH);
  }

  const styles = {
    root: { minHeight:"100vh", background:"#0c0c0c", color:"#d4d4d4", fontFamily:"'JetBrains Mono', 'SF Mono', 'Fira Code', monospace", fontSize:14 },
    container: { maxWidth:720, margin:"0 auto", padding:"20px 16px" },
  };

  // -- HOME --
  if (view === "home") {
    const pct = prog.total > 0 ? Math.round((prog.correct/prog.total)*100) : 0;
    return (
      <div style={styles.root}>
        <div style={styles.container}>
          <div style={{ borderBottom:"1px solid #222", paddingBottom:20, marginBottom:24 }}>
            <div style={{ color:"#555", fontSize:11, letterSpacing:3, textTransform:"uppercase", marginBottom:6 }}>CompTIA A+ 220-1201</div>
            <div style={{ fontSize:26, fontWeight:700, color:"#e5e5e5", letterSpacing:-0.5 }}>Core 1 Study Hub</div>
            <div style={{ color:"#555", fontSize:12, marginTop:6 }}>{QUESTIONS.length} questions &middot; 5 domains &middot; persistent tracking</div>
            {prog.total > 0 && (function() {
              var p = prog.total > 0 ? Math.round((prog.correct/prog.total)*100) : 0;
              var msg = p >= 85 ? "You're crushing it -- keep that energy!" : p >= 70 ? "Solid progress, you're getting there!" : p >= 50 ? "Building momentum -- keep pushing!" : "Every question makes you stronger!";
              return <div style={{ color: p>=70?"#34d399":"#fbbf24", fontSize:12, marginTop:8, fontWeight:500 }}>{msg}</div>;
            })()}
          </div>

          {prog.total > 0 && (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:1, background:"#222", borderRadius:8, overflow:"hidden", marginBottom:24 }}>
              {[
                { l:"answered", v:prog.total },
                { l:"accuracy", v:pct+"%" },
                { l:"exams", v:prog.exams.length },
              ].map(function(s,i) {
                return (
                  <div key={i} style={{ background:"#111", padding:"16px 12px", textAlign:"center" }}>
                    <div style={{ fontSize:22, fontWeight:700, color:"#e5e5e5" }}>{s.v}</div>
                    <div style={{ fontSize:10, color:"#555", letterSpacing:1, textTransform:"uppercase", marginTop:4 }}>{s.l}</div>
                  </div>
                );
              })}
            </div>
          )}

          <button onClick={startExam} style={{ width:"100%", padding:"18px", background:"#e5e5e5", color:"#0c0c0c", border:"none", borderRadius:8, fontSize:15, fontWeight:700, cursor:"pointer", marginBottom:20, letterSpacing:0.3, transition:"background 0.15s" }}
            onMouseOver={function(e){e.currentTarget.style.background="#fff";}} onMouseOut={function(e){e.currentTarget.style.background="#e5e5e5";}}>
            PRACTICE EXAM &mdash; 60 questions, 60 min
          </button>

          <div style={{ fontSize:11, color:"#555", letterSpacing:2, textTransform:"uppercase", marginBottom:12 }}>Study by Domain</div>
          {DOMAINS.map(function(d) {
            const ds = prog.ds[d.id];
            const dp = ds.a > 0 ? Math.round((ds.c/ds.a)*100) : null;
            const qCount = QUESTIONS.filter(function(q) { return q.d===d.id; }).length;
            const isOpen = sizePickerDomain === d.id;
            return (
              <div key={d.id} style={{ marginBottom:6 }}>
                <button onClick={function() { setSizePickerDomain(isOpen ? null : d.id); }} style={{ width:"100%", background:"#111", border:"1px solid " + (isOpen ? d.color+"66" : "#1a1a1a"), borderRadius: isOpen ? "8px 8px 0 0" : 8, padding:"14px 16px", cursor:"pointer", display:"flex", alignItems:"center", gap:14, transition:"border-color 0.15s", color:"#d4d4d4", textAlign:"left" }}
                  onMouseOver={function(e){ if(!isOpen) e.currentTarget.style.borderColor=d.color+"66";}} onMouseOut={function(e){ if(!isOpen) e.currentTarget.style.borderColor="#1a1a1a";}}>
                  <span style={{ fontSize:22, width:32, textAlign:"center" }}>{d.icon}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:600, fontSize:13, color:"#e5e5e5" }}>{d.name}</div>
                    <div style={{ fontSize:11, color:"#444", marginTop:2 }}>{d.w} of exam &middot; {qCount} questions</div>
                  </div>
                  {dp !== null && (
                    <div style={{ fontSize:13, fontWeight:700, color: dp>=75 ? "#34d399" : dp>=50 ? "#fbbf24" : "#f87171" }}>{dp}%</div>
                  )}
                  <div style={{ width:3, height:32, borderRadius:2, background: dp===null ? "#222" : dp>=75 ? "#34d399" : dp>=50 ? "#fbbf24" : "#f87171", opacity: dp===null ? 0.3 : 0.8 }} />
                </button>
                {isOpen && (
                  <div style={{ display:"flex", gap:1, background:"#222", borderRadius:"0 0 8px 8px", overflow:"hidden" }}>
                    {[{l:"Quick", n:10, desc:"10 Qs"}, {l:"Standard", n:15, desc:"15 Qs"}, {l:"Deep Dive", n:25, desc:"25 Qs"}].map(function(s) {
                      return (
                        <button key={s.n} onClick={function() { startStudy(d.id, s.n); }} style={{ flex:1, padding:"12px 8px", background:"#111", border:"none", cursor:"pointer", color:d.color, fontSize:12, fontWeight:600, transition:"background 0.15s" }}
                          onMouseOver={function(e){e.currentTarget.style.background="#1a1a1a";}} onMouseOut={function(e){e.currentTarget.style.background="#111";}}>
                          <div>{s.l}</div>
                          <div style={{ fontSize:10, color:"#555", marginTop:2 }}>{s.desc}</div>
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}

          <button onClick={function() { setSizePickerDomain(sizePickerDomain === 0 ? null : 0); }} style={{ width:"100%", padding:"12px", background:"transparent", border:"1px solid " + (sizePickerDomain === 0 ? "#a78bfa44" : "#222"), borderRadius: sizePickerDomain === 0 ? "8px 8px 0 0" : 8, color:"#555", fontSize:12, fontWeight:600, cursor:"pointer", marginTop:16, marginBottom: sizePickerDomain === 0 ? 0 : 8 }}>
            RANDOM MIX &mdash; All Domains
          </button>
          {sizePickerDomain === 0 && (
            <div style={{ display:"flex", gap:1, background:"#222", borderRadius:"0 0 8px 8px", overflow:"hidden", marginBottom:8 }}>
              {[{l:"Quick", n:10, desc:"10 Qs"}, {l:"Standard", n:15, desc:"15 Qs"}, {l:"Deep Dive", n:25, desc:"25 Qs"}].map(function(s) {
                return (
                  <button key={s.n} onClick={function() { startStudy(null, s.n); }} style={{ flex:1, padding:"12px 8px", background:"#111", border:"none", cursor:"pointer", color:"#a78bfa", fontSize:12, fontWeight:600, transition:"background 0.15s" }}
                    onMouseOver={function(e){e.currentTarget.style.background="#1a1a1a";}} onMouseOut={function(e){e.currentTarget.style.background="#111";}}>
                    <div>{s.l}</div>
                    <div style={{ fontSize:10, color:"#555", marginTop:2 }}>{s.desc}</div>
                  </button>
                );
              })}
            </div>
          )}
          <div style={{ display:"flex", gap:8, marginTop:8 }}>
            <button onClick={function() { setView("dashboard"); }} style={{ flex:1, padding:"12px", background:"#111", border:"1px solid #1a1a1a", borderRadius:8, color:"#888", fontSize:12, fontWeight:600, cursor:"pointer" }}>{"\u{1F4CA}"} Dashboard</button>
            {prog.total > 0 && (
              <button onClick={resetAll} style={{ padding:"12px 16px", background:"#111", border:"1px solid #1a1a1a", borderRadius:8, color:"#f87171", fontSize:12, fontWeight:600, cursor:"pointer" }}>Reset</button>
            )}
          </div>

          {/* Cloud Sync Section */}
          <div style={{ marginTop:24, borderTop:"1px solid #1a1a1a", paddingTop:16 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
              <div style={{ fontSize:12, fontWeight:700, color:"#888" }}>{"\u2601\uFE0F"} Cloud Sync</div>
              {syncToken && syncStatus === "synced" && (
                <div style={{ fontSize:11, color:"#34d399" }}>{"\u2713"} {syncMsg}</div>
              )}
              {syncToken && syncStatus === "syncing" && (
                <div style={{ fontSize:11, color:"#fbbf24" }}>{syncMsg}</div>
              )}
              {syncToken && syncStatus === "error" && (
                <div style={{ fontSize:11, color:"#f87171" }}>{syncMsg}</div>
              )}
            </div>

            {!syncToken ? (
              <div>
                {!showSyncSetup ? (
                  <button onClick={function() { setShowSyncSetup(true); }} style={{ width:"100%", padding:"12px", background:"#111", border:"1px solid #1a1a1a", borderRadius:8, color:"#a78bfa", fontSize:12, fontWeight:600, cursor:"pointer" }}>
                    Connect GitHub to sync across devices
                  </button>
                ) : (
                  <div style={{ background:"#111", border:"1px solid #1a1a1a", borderRadius:8, padding:16 }}>
                    <div style={{ fontSize:11, color:"#888", marginBottom:12, lineHeight:1.6 }}>
                      1. Go to <span style={{ color:"#a78bfa" }}>github.com/settings/tokens</span><br/>
                      2. Generate a token with only <span style={{ color:"#e5e5e5", fontWeight:600 }}>gist</span> scope<br/>
                      3. Paste it below
                    </div>
                    <input
                      type="password"
                      placeholder="ghp_xxxxxxxxxxxx"
                      value={tokenInput}
                      onChange={function(e) { setTokenInput(e.target.value); }}
                      onKeyDown={function(e) { if (e.key === "Enter") connectSync(); }}
                      style={{ width:"100%", padding:"10px 12px", background:"#0c0c0c", border:"1px solid #333", borderRadius:6, color:"#e5e5e5", fontSize:13, fontFamily:"inherit", marginBottom:8, outline:"none" }}
                    />
                    <div style={{ display:"flex", gap:8 }}>
                      <button onClick={connectSync} disabled={syncStatus === "syncing"} style={{ flex:1, padding:"10px", background: syncStatus === "syncing" ? "#1a1a1a" : "#a78bfa22", border:"1px solid #a78bfa44", borderRadius:6, color:"#a78bfa", fontSize:12, fontWeight:600, cursor: syncStatus === "syncing" ? "wait" : "pointer" }}>
                        {syncStatus === "syncing" ? "Connecting..." : "Connect"}
                      </button>
                      <button onClick={function() { setShowSyncSetup(false); setTokenInput(""); }} style={{ padding:"10px 16px", background:"#111", border:"1px solid #1a1a1a", borderRadius:6, color:"#555", fontSize:12, cursor:"pointer" }}>
                        Cancel
                      </button>
                    </div>
                    {syncStatus === "error" && <div style={{ fontSize:11, color:"#f87171", marginTop:8 }}>{syncMsg}</div>}
                  </div>
                )}
              </div>
            ) : (
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={function() { doSync(); }} disabled={syncStatus === "syncing"} style={{ flex:1, padding:"10px", background:"#111", border:"1px solid #1a1a1a", borderRadius:8, color: syncStatus === "syncing" ? "#555" : "#a78bfa", fontSize:12, fontWeight:600, cursor: syncStatus === "syncing" ? "wait" : "pointer" }}>
                  {syncStatus === "syncing" ? "Syncing..." : "Sync Now"}
                </button>
                <button onClick={disconnectSync} style={{ padding:"10px 16px", background:"#111", border:"1px solid #1a1a1a", borderRadius:8, color:"#555", fontSize:12, cursor:"pointer" }}>
                  Disconnect
                </button>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // -- QUIZ --
  if (view === "quiz") {
    const q = qs[qi];
    if (!q) return null;
    const pBar = (qi / qs.length) * 100;
    const isRight = pick !== null && optOrder[pick] === q.c;

    return (
      <div style={styles.root}>
        <div style={styles.container}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <span style={{ fontSize:12, color:"#555" }}><span style={{ color:"#e5e5e5", fontWeight:700 }}>{qi+1}</span>/{qs.length}</span>
            {mode === "exam" && (
              <span style={{ fontSize:16, fontWeight:700, color: timer<300?"#f87171":timer<600?"#fbbf24":"#34d399", fontVariantNumeric:"tabular-nums" }}>{fmt(timer)}</span>
            )}
            <span style={{ fontSize:11, color:"#555", padding:"3px 10px", border:"1px solid #222", borderRadius:20 }}>{DOMAIN_NAMES[q.d]}</span>
          </div>

          <div style={{ height:2, background:"#1a1a1a", borderRadius:1, marginBottom:24, overflow:"hidden" }}>
            <div style={{ height:"100%", width:pBar+"%", background:"#555", transition:"width 0.3s" }} />
          </div>

          <div style={{ fontSize:11, color: (DOMAINS.find(function(d){return d.id===q.d;}) || {}).color || "#555", fontWeight:600, letterSpacing:1, marginBottom:10, textTransform:"uppercase" }}>{q.obj}</div>

          <div style={{ fontSize:16, fontWeight:500, lineHeight:1.6, color:"#e5e5e5", marginBottom:28 }}>{q.q}</div>

          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {optOrder.map(function(origIdx, displayIdx) {
              var opt = q.o[origIdx];
              var bg = "#111", border = "#1a1a1a", tc = "#d4d4d4", indicator = null;
              if (locked) {
                if (origIdx === q.c) { bg="#34d39910"; border="#34d39944"; tc="#34d399"; indicator="\u2713"; }
                else if (displayIdx === pick && !isRight) { bg="#f8717110"; border="#f8717144"; tc="#f87171"; indicator="\u2717"; }
                else { tc="#333"; }
              }
              return (
                <button key={displayIdx} onClick={function() { answer(displayIdx); }} disabled={locked} style={{ padding:"14px 16px", background:bg, border:"1px solid "+border, borderRadius:8, color:tc, fontSize:14, cursor:locked?"default":"pointer", textAlign:"left", transition:"all 0.12s", display:"flex", alignItems:"center", gap:12 }}
                  onMouseOver={function(e) { if(!locked) { e.currentTarget.style.borderColor="#333"; e.currentTarget.style.background="#161616"; }}}
                  onMouseOut={function(e) { if(!locked) { e.currentTarget.style.borderColor="#1a1a1a"; e.currentTarget.style.background="#111"; }}}>
                  <span style={{ width:26, height:26, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, background: indicator ? (origIdx===q.c ? "#34d399" : "#f87171") : "#1a1a1a", color: indicator ? "#0c0c0c" : "#555", flexShrink:0 }}>
                    {indicator || String.fromCharCode(65+displayIdx)}
                  </span>
                  <span style={{ lineHeight:1.5 }}>{opt}</span>
                </button>
              );
            })}
          </div>

          {locked && (
            <div style={{ marginTop:20 }}>
              {(mode === "study" || showExp) ? (
                <div style={{ background: isRight ? "#34d39908" : "#f8717108", border:"1px solid "+(isRight ? "#34d39922" : "#f8717122"), borderRadius:8, padding:"14px 16px", marginBottom:16 }}>
                  <div style={{ fontSize:12, fontWeight:700, color: isRight ? "#34d399" : "#f87171", marginBottom:6 }}>{isRight ? "Correct" : "Incorrect"}</div>
                  <div style={{ fontSize:13, color:"#999", lineHeight:1.7 }}>{q.ex}</div>
                </div>
              ) : (
                <button onClick={function() { setShowExp(true); }} style={{ background:"transparent", border:"1px solid #222", borderRadius:6, padding:"8px 16px", color:"#555", fontSize:12, cursor:"pointer", marginBottom:16 }}>Show explanation</button>
              )}

              <div style={{ marginBottom:12 }}>
                <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
                  <span style={{ fontSize:14 }}>{"\u{1F4AC}"}</span>
                  <span style={{ fontSize:12, fontWeight:700, color:"#60a5fa", letterSpacing:1, textTransform:"uppercase" }}>Comment</span>
                </div>
                <textarea
                  value={guessComment}
                  onChange={function(e) { setGuessComment(e.target.value); }}
                  placeholder="Add a comment, note, or question about this answer..."
                  rows={3}
                  style={{ width:"100%", background:"#0f1117", border:"1px solid #60a5fa33", borderRadius:8, padding:"12px 14px", color:"#ccc", fontSize:13, fontFamily:"inherit", resize:"vertical", outline:"none", boxSizing:"border-box", marginBottom:8, transition:"border-color 0.15s" }}
                  onFocus={function(e) { e.target.style.borderColor="#60a5fa88"; }}
                  onBlur={function(e) { e.target.style.borderColor="#60a5fa33"; }}
                />
                <button onClick={function() { setGuessed(function(g) { return !g; }); }} style={{ width:"100%", padding:"10px 14px", background: guessed ? "#fbbf2415" : "transparent", border:"1px solid "+(guessed ? "#fbbf2444" : "#222"), borderRadius:8, color: guessed ? "#fbbf24" : "#444", fontSize:12, fontWeight:600, cursor:"pointer", transition:"all 0.15s", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                  <span style={{ fontSize:14 }}>{"\u{1F3B2}"}</span>
                  {guessed ? "Marked as guess -- won't count as known" : "I guessed -- be honest!"}
                </button>
              </div>

              <button onClick={next} style={{ width:"100%", padding:"14px", background:"#e5e5e5", color:"#0c0c0c", border:"none", borderRadius:8, fontSize:14, fontWeight:700, cursor:"pointer" }}>
                {qi+1 >= qs.length ? "See Results" : "Next \u2192"}
              </button>
            </div>
          )}

          {mode === "exam" && (
            <button onClick={function() { if(confirm("End exam early?")) finishWith(sessionResultsRef.current); }} style={{ marginTop:14, background:"transparent", border:"none", color:"#333", fontSize:11, cursor:"pointer", textDecoration:"underline" }}>end exam early</button>
          )}
        </div>
      </div>
    );
  }

  // -- RESULTS --
  if (view === "results") {
    const correct = sessionResults.filter(function(r){return r.correct;}).length;
    const total = sessionResults.length;
    const guessedCount = sessionResults.filter(function(r){return r.guessed;}).length;
    const knownCorrect = sessionResults.filter(function(r){return r.correct && !r.guessed;}).length;
    const knownTotal = sessionResults.filter(function(r){return !r.guessed;}).length;
    const pct = Math.round((correct/Math.max(total,1))*100);
    const realPct = knownTotal > 0 ? Math.round((knownCorrect/knownTotal)*100) : 0;
    const score = mode==="exam" ? Math.round((correct/Math.max(total,1))*900) : null;
    const passed = score !== null && score >= 675;
    const missed = sessionResults.filter(function(r){return !r.correct;});
    const luckyGuesses = sessionResults.filter(function(r){return r.correct && r.guessed;});

    const domBreak = DOMAINS.map(function(d) {
      const dr = sessionResults.filter(function(r){return r.d===d.id;});
      const dc = dr.filter(function(r){return r.correct;}).length;
      const dg = dr.filter(function(r){return r.guessed;}).length;
      return { id:d.id, name:d.name, icon:d.icon, w:d.w, color:d.color, total:dr.length, correct:dc, guessed:dg, pct: dr.length>0 ? Math.round((dc/dr.length)*100) : null };
    }).filter(function(d) { return d.total > 0; });

    return (
      <div style={styles.root}>
        <div style={styles.container}>
          <div style={{ textAlign:"center", paddingTop:20, marginBottom:32 }}>
            {score !== null && (
              <React.Fragment>
                <div style={{ fontSize:56, fontWeight:900, color: passed?"#34d399":"#f87171", letterSpacing:-2 }}>{score}</div>
                <div style={{ fontSize:16, fontWeight:700, color: passed?"#34d399":"#f87171", marginBottom:4 }}>{passed ? "PASSED" : "NOT YET"}</div>
                <div style={{ fontSize:12, color:"#444" }}>675 needed to pass</div>
              </React.Fragment>
            )}
            <div style={{ fontSize:14, color:"#888", marginTop:score?8:0 }}>{correct}/{total} correct &mdash; {pct}%</div>
            {(function() {
              var msg = pct >= 90 ? "Absolutely nailed it!" : pct >= 75 ? "Strong session -- you know your stuff!" : pct >= 60 ? "Good work! Review the misses below and you'll own these next time." : pct >= 40 ? "Getting there -- focus on the domains below and come back stronger." : "Tough round, but now you know what to study. That's the whole point!";
              return <div style={{ fontSize:13, color: pct>=75?"#34d399":pct>=50?"#fbbf24":"#f87171", marginTop:10, fontWeight:500, maxWidth:400, margin:"10px auto 0", lineHeight:1.5 }}>{msg}</div>;
            })()}
            {guessedCount > 0 && (
              <div style={{ marginTop:8 }}>
                <div style={{ fontSize:12, color:"#fbbf24" }}>{"\u{1F3B2}"} {guessedCount} guessed &mdash; real accuracy: {knownCorrect}/{knownTotal} ({realPct}%)</div>
                {luckyGuesses.length > 0 && (
                  <div style={{ fontSize:11, color:"#666", marginTop:2 }}>{luckyGuesses.length} lucky guess{luckyGuesses.length>1?"es":""} (correct but flagged)</div>
                )}
              </div>
            )}
          </div>

          <div style={{ marginBottom:28 }}>
            <div style={{ fontSize:11, color:"#555", letterSpacing:2, textTransform:"uppercase", marginBottom:14 }}>Domain Breakdown</div>
            {domBreak.map(function(d) {
              return (
                <div key={d.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
                  <span style={{ fontSize:16, width:24 }}>{d.icon}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                      <span style={{ fontSize:12, fontWeight:600, color:"#aaa" }}>{d.name}</span>
                      <span style={{ fontSize:12, fontWeight:700, color: d.pct>=75?"#34d399":d.pct>=50?"#fbbf24":"#f87171" }}>{d.correct}/{d.total}{d.guessed > 0 ? " ("+d.guessed+"\u{1F3B2})" : ""}</span>
                    </div>
                    <div style={{ height:3, background:"#1a1a1a", borderRadius:2, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:d.pct+"%", background: d.pct>=75?"#34d399":d.pct>=50?"#fbbf24":"#f87171", borderRadius:2 }} />
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {missed.length > 0 && (
            <div style={{ marginBottom:28 }}>
              <div style={{ fontSize:11, color:"#555", letterSpacing:2, textTransform:"uppercase", marginBottom:14 }}>Missed Questions</div>
              {missed.map(function(r, i) {
                const q = QUESTIONS.find(function(x) { return x.id === r.id; });
                if (!q) return null;
                return (
                  <div key={i} style={{ background:"#111", border:"1px solid #1a1a1a", borderRadius:8, padding:14, marginBottom:8 }}>
                    <div style={{ fontSize:13, fontWeight:500, color:"#ccc", marginBottom:8, lineHeight:1.5 }}>{q.q}</div>
                    <div style={{ fontSize:12, color:"#f87171", marginBottom:3 }}>You said: {q.o[r.picked]}</div>
                    <div style={{ fontSize:12, color:"#34d399", marginBottom:8 }}>Answer: {q.o[q.c]}</div>
                    {r.comment && <div style={{ fontSize:12, color:"#fbbf24", marginBottom:8, fontStyle:"italic" }}>Your note: "{r.comment}"</div>}
                    <div style={{ fontSize:12, color:"#666", lineHeight:1.6 }}>{q.ex}</div>
                  </div>
                );
              })}
            </div>
          )}

          {luckyGuesses.length > 0 && (
            <div style={{ marginBottom:28 }}>
              <div style={{ fontSize:11, color:"#fbbf24", letterSpacing:2, textTransform:"uppercase", marginBottom:14 }}>{"\u{1F3B2}"} Lucky Guesses &mdash; review these</div>
              {luckyGuesses.map(function(r, i) {
                const q = QUESTIONS.find(function(x) { return x.id === r.id; });
                if (!q) return null;
                return (
                  <div key={i} style={{ background:"#111", border:"1px solid #fbbf2422", borderRadius:8, padding:14, marginBottom:8 }}>
                    <div style={{ fontSize:13, fontWeight:500, color:"#ccc", marginBottom:8, lineHeight:1.5 }}>{q.q}</div>
                    <div style={{ fontSize:12, color:"#fbbf24", marginBottom:8 }}>Answer: {q.o[q.c]}</div>
                    {r.comment && <div style={{ fontSize:12, color:"#fbbf24", marginBottom:8, fontStyle:"italic", opacity:0.7 }}>Your note: "{r.comment}"</div>}
                    <div style={{ fontSize:12, color:"#666", lineHeight:1.6 }}>{q.ex}</div>
                  </div>
                );
              })}
            </div>
          )}

          {(function() {
            var noted = sessionResults.filter(function(r) { return r.correct && !r.guessed && r.comment; });
            if (noted.length === 0) return null;
            return (
              <div style={{ marginBottom:28 }}>
                <div style={{ fontSize:11, color:"#60a5fa", letterSpacing:2, textTransform:"uppercase", marginBottom:14 }}>Your Notes</div>
                {noted.map(function(r, i) {
                  var q = QUESTIONS.find(function(x) { return x.id === r.id; });
                  if (!q) return null;
                  return (
                    <div key={i} style={{ background:"#111", border:"1px solid #60a5fa22", borderRadius:8, padding:14, marginBottom:8 }}>
                      <div style={{ fontSize:13, fontWeight:500, color:"#ccc", marginBottom:8, lineHeight:1.5 }}>{q.q}</div>
                      <div style={{ fontSize:12, color:"#34d399", marginBottom:8 }}>Answer: {q.o[q.c]}</div>
                      <div style={{ fontSize:12, color:"#60a5fa", marginBottom:8, fontStyle:"italic" }}>Your note: "{r.comment}"</div>
                      <div style={{ fontSize:12, color:"#666", lineHeight:1.6 }}>{q.ex}</div>
                    </div>
                  );
                })}
              </div>
            );
          })()}

          <CopySessionResults results={sessionResults} mode={mode} domain={domainFilter} />

          <div style={{ display:"flex", gap:8 }}>
            <button onClick={function() { setView("home"); }} style={{ flex:1, padding:"14px", background:"#e5e5e5", color:"#0c0c0c", border:"none", borderRadius:8, fontSize:14, fontWeight:700, cursor:"pointer" }}>Home</button>
            <button onClick={function() { setView("dashboard"); }} style={{ flex:1, padding:"14px", background:"#111", border:"1px solid #1a1a1a", borderRadius:8, color:"#888", fontSize:13, fontWeight:600, cursor:"pointer" }}>Dashboard</button>
          </div>
        </div>
      </div>
    );
  }

  // -- DASHBOARD --
  if (view === "dashboard") {
    const pct = prog.total>0 ? Math.round((prog.correct/prog.total)*100) : 0;
    return (
      <div style={styles.root}>
        <div style={styles.container}>
          <button onClick={function() { setView("home"); }} style={{ background:"transparent", border:"none", color:"#555", fontSize:12, cursor:"pointer", padding:0, marginBottom:20 }}>&larr; back</button>

          <div style={{ fontSize:22, fontWeight:700, color:"#e5e5e5", marginBottom:24 }}>Progress Dashboard</div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:1, background:"#222", borderRadius:8, overflow:"hidden", marginBottom:28 }}>
            <div style={{ background:"#111", padding:20, textAlign:"center" }}>
              <div style={{ fontSize:32, fontWeight:900, color:"#e5e5e5" }}>{prog.total}</div>
              <div style={{ fontSize:10, color:"#555", letterSpacing:1, textTransform:"uppercase", marginTop:4 }}>total questions</div>
            </div>
            <div style={{ background:"#111", padding:20, textAlign:"center" }}>
              <div style={{ fontSize:32, fontWeight:900, color: pct>=75?"#34d399":pct>=50?"#fbbf24":"#f87171" }}>{pct}%</div>
              <div style={{ fontSize:10, color:"#555", letterSpacing:1, textTransform:"uppercase", marginTop:4 }}>accuracy</div>
            </div>
          </div>

          <div style={{ fontSize:11, color:"#555", letterSpacing:2, textTransform:"uppercase", marginBottom:14 }}>Domain Mastery</div>
          {DOMAINS.map(function(d) {
            const ds = prog.ds[d.id];
            const dp = ds.a>0 ? Math.round((ds.c/ds.a)*100) : 0;
            const label = ds.a===0 ? "not started" : dp>=80 ? "strong" : dp>=60 ? "developing" : "needs work";
            const lc = ds.a===0 ? "#333" : dp>=80 ? "#34d399" : dp>=60 ? "#fbbf24" : "#f87171";
            return (
              <div key={d.id} style={{ background:"#111", border:"1px solid #1a1a1a", borderRadius:8, padding:"14px 16px", marginBottom:8 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontSize:18 }}>{d.icon}</span>
                    <div>
                      <div style={{ fontWeight:600, fontSize:13, color:"#ccc" }}>{d.name}</div>
                      <div style={{ fontSize:11, color:"#444" }}>{ds.a} answered &middot; {ds.c} correct</div>
                    </div>
                  </div>
                  <span style={{ fontSize:11, fontWeight:700, color:lc, textTransform:"uppercase", letterSpacing:1 }}>{label}</span>
                </div>
                <div style={{ height:4, background:"#1a1a1a", borderRadius:2, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:dp+"%", background:d.color, borderRadius:2, transition:"width 0.5s", opacity:0.8 }} />
                </div>
              </div>
            );
          })}

          {prog.exams.length > 0 && (
            <div style={{ marginTop:24 }}>
              <div style={{ fontSize:11, color:"#555", letterSpacing:2, textTransform:"uppercase", marginBottom:14 }}>Exam History</div>
              {prog.exams.slice().reverse().map(function(e,i) {
                return (
                  <div key={i} style={{ background:"#111", border:"1px solid "+(e.pass?"#34d39922":"#f8717122"), borderRadius:8, padding:"12px 16px", marginBottom:6, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div>
                      <div style={{ fontWeight:600, fontSize:13, color:"#aaa" }}>{e.date}</div>
                      <div style={{ fontSize:11, color:"#444" }}>{e.c}/{e.t} correct</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:20, fontWeight:900, color: e.pass?"#34d399":"#f87171" }}>{e.score}</div>
                      <div style={{ fontSize:10, fontWeight:700, color: e.pass?"#34d399":"#f87171", letterSpacing:1 }}>{e.pass?"PASS":"FAIL"}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {prog.sessions && prog.sessions.length > 0 && (
            <div style={{ marginTop:24 }}>
              <div style={{ fontSize:11, color:"#555", letterSpacing:2, textTransform:"uppercase", marginBottom:14 }}>Recent Sessions</div>
              {prog.sessions.slice().reverse().slice(0,10).map(function(s,i) {
                return (
                  <div key={i} style={{ background:"#111", border:"1px solid #1a1a1a", borderRadius:8, padding:"12px 16px", marginBottom:6 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <span style={{ color:"#666", fontSize:12 }}>{s.date} &middot; {s.mode === "exam" ? "Exam" : s.domain ? DOMAIN_NAMES[s.domain] : "All domains"}</span>
                      <span style={{ color: Math.round((s.correct/Math.max(s.total,1))*100)>=75 ? "#34d399" : "#fbbf24", fontWeight:700, fontSize:12 }}>{s.correct}/{s.total}</span>
                    </div>
                    {s.results && (
                      <div style={{ marginTop:8 }}><CopySessionResults results={s.results} mode={s.mode} domain={s.domain} date={s.date} label={"Copy results"} /></div>
                    )}
                    {!s.results && (
                      <div style={{ fontSize:11, color:"#333", marginTop:6, fontStyle:"italic" }}>No detailed results (session before this feature)</div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          <CopyProgress prog={prog} />

          <div style={{ marginTop:16, padding:16, border:"1px solid #1a1a1a", borderRadius:8 }}>
            <div style={{ fontSize:12, fontWeight:700, color:"#888", marginBottom:6 }}>{"\u{1F4CC}"} Exam Info</div>
            <div style={{ fontSize:12, color:"#555", lineHeight:1.7 }}>
              Real exam: 90 questions, 90 minutes, 675/900 to pass. Domain 5 (Troubleshooting) = 29% &mdash; biggest chunk. Ports &amp; protocols are heavily tested. Focus on domains below 75%.
            </div>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
