ex:"10.0.0.0/8 = Class A private range (huge: 16 million+ addresses). 172.16.0.0/12 = Class B. 192.168.0.0/16 = Class C. Class D (224.x.x.x) is multicast, not private." },
{ id:219, d:2, obj:"2.1", q:"A network admin needs to monitor switch performance remotely. Which protocol and port should be allowed through the firewall?",
o:["SMTP on port 25","SNMP on port 161","SSH on port 22","LDAP on port 389"], c:1,
ex:"SNMP (port 161) monitors and manages network devices like switches and routers. SNMP traps use port 162. SSH is for remote access. LDAP is for directory services." },
{ id:220, d:2, obj:"2.1", q:"Which port pair is used by SNMP for queries and traps respectively?",
o:["160 and 161","161 and 162","162 and 163","514 and 515"], c:1,
ex:"SNMP uses port 161 for queries (polling devices) and port 162 for traps (alerts sent from devices). Port 514 is Syslog." },

// -- Questions 221-222: Mobile Devices (display panels) --
{ id:221, d:3, obj:"3.1", q:"A graphic designer needs a laptop display with the widest viewing angles and most accurate colors. Which panel type is BEST?",
o:["TN","VA","IPS","OLED"], c:3,
ex:"OLED provides the best color accuracy, contrast (infinite), and viewing angles with per-pixel lighting. IPS is second best for angles and color. TN has the worst viewing angles but fastest response." },
{ id:222, d:3, obj:"3.1", q:"A competitive gamer wants the fastest pixel response time. Which display panel type is traditionally the FASTEST?",
o:["IPS","OLED","VA","TN"], c:3,
ex:"TN (Twisted Nematic) panels traditionally have the fastest response times (1ms), making them popular for competitive gaming. Trade-off: worst viewing angles and color accuracy. OLED is catching up." },

// -- Questions 223-226: Troubleshooting (BSOD error codes) --
{ id:223, d:5, obj:"5.1", q:"A Windows PC displays a BSOD with 'IRQL_NOT_LESS_OR_EQUAL.' Which components should be checked FIRST?",
o:["Hard drive and power supply","RAM and recently installed drivers","CPU and motherboard","Network card and BIOS settings"], c:1,
ex:"IRQL_NOT_LESS_OR_EQUAL typically indicates a driver accessing invalid memory. Check RAM (run memtest) and recently installed/updated drivers. Roll back drivers if the issue started after an update." },
{ id:224, d:5, obj:"5.1", q:"A BSOD displays 'KERNEL_DATA_INPAGE_ERROR.' Which component is MOST likely failing?",
o:["RAM","GPU","Storage drive (HDD/SSD)","Network adapter"], c:2,
ex:"KERNEL_DATA_INPAGE_ERROR means Windows couldn't read data from the paging file on disk. This points to a failing HDD/SSD. Run chkdsk and check SMART status. Can also indicate bad RAM in rare cases." },
{ id:225, d:5, obj:"5.1", q:"After installing a new graphics driver, a PC shows a BSOD with 'DRIVER_IRQL_NOT_LESS_OR_EQUAL.' What should the tech do FIRST?",
o:["Replace the GPU","Boot to Safe Mode and roll back the driver","Run a memory diagnostic","Reinstall Windows"], c:1,
ex:"DRIVER_IRQL specifically points to a driver issue. Boot Safe Mode (minimal drivers loaded), then roll back or uninstall the problematic driver. Replacing hardware or reinstalling the OS is premature." },
{ id:226, d:5, obj:"5.1", q:"A BSOD displays 'PAGE_FAULT_IN_NONPAGED_AREA.' Which diagnostic should be run FIRST?",
o:["chkdsk","sfc /scannow","Memory diagnostic (memtest)","Disk defragmentation"], c:2,
ex:"PAGE_FAULT_IN_NONPAGED_AREA = system tried to access memory that doesn't exist or is corrupted. Run memory diagnostics first. Can also be caused by a faulty driver, but bad RAM is the primary suspect." },

// -- Questions 227-228, 232: Networking (RDP, SSH) --
{ id:227, d:2, obj:"2.1", q:"A technician needs to allow remote GUI access to a Windows server through the firewall. Which port must be opened?",
o:["22","23","443","3389"], c:3,
ex:"RDP (Remote Desktop Protocol) uses port 3389 for GUI-based remote access to Windows machines. Port 22 is SSH (command-line remote access). Port 23 is Telnet. Port 443 is HTTPS." },
{ id:228, d:2, obj:"2.1", q:"Which TWO ports are used for remote access — one for Linux command line, one for Windows desktop GUI?",
o:["21 and 3389","22 and 3389","23 and 443","80 and 22"], c:1,
ex:"SSH (port 22) = Linux/Mac command-line remote access. RDP (port 3389) = Windows GUI remote desktop. Port 21 is FTP. Port 23 is Telnet (insecure). Port 443 is HTTPS." },

// -- Questions 229-230: Mobile Devices (Exchange ActiveSync) --
{ id:229, d:1, obj:"1.3", q:"A company needs employees' phones to sync email, contacts, AND calendars with the corporate mail server in real time. Which protocol should be configured?",
o:["IMAP","POP3","SMTP","Exchange ActiveSync"], c:3,
ex:"Exchange ActiveSync provides real-time push sync for email, contacts, and calendars together. IMAP syncs email only. POP3 downloads email. SMTP only sends email." },
{ id:230, d:1, obj:"1.3", q:"A user's phone syncs email via IMAP but contacts and calendar are not syncing. What protocol change would fix this?",
o:["Switch to POP3","Switch to SMTP","Enable Exchange ActiveSync","Enable SNMP"], c:2,
ex:"IMAP only handles email. Exchange ActiveSync syncs email + contacts + calendar as a package. POP3 and SMTP don't sync contacts/calendar either. SNMP is for network monitoring." },

// -- Question 231: Troubleshooting (Safe Mode) --
{ id:231, d:5, obj:"5.1", q:"A PC boots and immediately displays a BSOD before reaching the desktop. Which boot option lets the tech troubleshoot with minimal drivers loaded?",
o:["Last Known Good Configuration","Safe Mode","Recovery Console","BIOS Setup"], c:1,
ex:"Safe Mode loads only essential drivers and services, bypassing the problematic driver causing the BSOD. This allows the tech to uninstall or roll back the offending driver." },

// -- Question 232: Networking (SSH port) --
{ id:232, d:2, obj:"2.1", q:"A tech is told to 'SSH into the server.' Which port will this connection use by default?",
o:["21","22","23","3389"], c:1,
ex:"SSH = port 22, always. It provides encrypted command-line access. Port 21 is FTP. Port 23 is Telnet (unencrypted remote CLI — the insecure version of SSH). Port 3389 is RDP (GUI remote access)." },

// -- Question 233: Mobile Devices (laptop power path) --
{ id:233, d:1, obj:"1.1", q:"A laptop won't charge. The tech tests the wall outlet and it works fine. Which component between the wall and the laptop battery is MOST likely faulty?",
o:["Inverter board","AC adapter (power brick)","LCD panel","DC-in jack or AC adapter"], c:3,
ex:"The AC adapter converts wall AC to DC for the laptop. If the outlet works but the laptop won't charge, check the AC adapter first, then the DC-in jack. The inverter is for CCFL backlights, not power delivery." },

// -- Question 234: Mobile Devices (inverter board) --
{ id:234, d:1, obj:"1.1", q:"A technician replaces an older laptop's CCFL backlight. Which component drives this backlight by converting DC to AC?",
o:["AC adapter","Power supply unit","Inverter board","Digitizer"], c:2,
ex:"The inverter board converts DC power to AC to drive CCFL backlights in older LCDs. Modern LED-backlit displays don't need an inverter. The AC adapter converts wall AC to DC — the opposite direction." },

// -- Question 235: Hardware (Ryzen socket upgrade) --
{ id:235, d:3, obj:"3.5", q:"A technician is upgrading a Ryzen 5 5600X system to a Ryzen 7 7700X. What MUST be replaced along with the CPU?",
o:["Only the CPU cooler","The motherboard (different socket)","The RAM and power supply","The GPU and storage drive"], c:1,
ex:"Ryzen 5000 = AM4 socket. Ryzen 7000 = AM5 socket. The motherboard must be replaced because the sockets are incompatible. AM5 also requires DDR5 RAM, but the question asks what MUST change — the board." },

// -- Question 236: Hardware (AM5 LGA socket) --
{ id:236, d:3, obj:"3.5", q:"Which AMD socket type uses LGA (Land Grid Array) where pins are on the motherboard instead of the CPU?",
o:["AM3","AM4","AM5","FM2+"], c:2,
ex:"AM5 is AMD's first LGA socket (LGA 1718) — pins on the board, not the CPU. AM4 and all previous AMD consumer sockets were PGA (pins on the CPU). Intel has used LGA for years." },

// -- Question 237: Virtualization & Cloud (VM snapshot rollback) --
{ id:237, d:4, obj:"4.2", q:"A developer takes a VM snapshot before installing a risky update. The update breaks the application. What can the developer do?",
o:["Restore from the cloud backup","Revert to the snapshot to undo the update","Reinstall the host operating system","Run a memory diagnostic on the VM"], c:1,
ex:"Reverting to a snapshot restores the VM to its exact state when the snapshot was taken, undoing the failed update. Snapshots are quick rollback points — like save states in a video game." },

// -- Question 238: Virtualization & Cloud (snapshot limitations) --
{ id:238, d:4, obj:"4.2", q:"Why should VM snapshots NOT be used as long-term backups?",
o:["Snapshots are automatically deleted after 24 hours","Snapshots consume growing disk space and degrade VM performance over time","Snapshots can only save RAM, not disk state","Snapshots require the host OS to be shut down"], c:1,
ex:"Snapshots track all changes since creation, growing in size and slowing disk I/O. They're meant as temporary rollback points, not permanent backups. Use proper backup solutions for long-term retention." },

// -- Question 239: Networking (SSH + RDP port pair) --
{ id:239, d:2, obj:"2.1", q:"A tech needs to remotely manage a Linux server's command line AND allow a coworker to view a Windows PC's desktop. Which port pair is needed?",
o:["22 and 443","23 and 3389","22 and 3389","21 and 5900"], c:2,
ex:"SSH (port 22) = Linux command-line remote access. RDP (port 3389) = Windows GUI remote desktop. Port 23 is Telnet (insecure). Port 5900 is VNC (cross-platform remote desktop)." },

// -- Question 240: Networking (VNC port) --
{ id:240, d:2, obj:"2.1", q:"Which protocol and port provides cross-platform remote desktop access and is an alternative to RDP?",
o:["SSH on port 22","Telnet on port 23","VNC on port 5900","SNMP on port 161"], c:2,
ex:"VNC (Virtual Network Computing) uses port 5900 and works across Windows, Mac, and Linux. RDP (3389) is Windows-native. SSH (22) is command-line only. Telnet (23) is insecure CLI access." },

// -- Question 241: Hardware (LGA 1700 socket) --
{ id:241, d:3, obj:"3.5", q:"A technician is building a PC for a customer using an Intel Core i7-13700K. Which socket does the motherboard need?",
o:["AM4","AM5","LGA 1200","LGA 1700"], c:3,
ex:"Intel 12th, 13th, and 14th gen use LGA 1700. LGA 1200 is 10th/11th gen. AM4 and AM5 are AMD sockets. Always verify socket compatibility before buying a motherboard." },

// -- Question 242: Networking (VNC firewall detection) --
{ id:242, d:2, obj:"2.1", q:"A firewall log shows traffic on port 5900 from an unknown source. What type of remote access is being attempted?",
o:["SSH","RDP","VNC","SNMP"], c:2,
ex:"Port 5900 = VNC (Virtual Network Computing) remote desktop. Unknown VNC traffic could be unauthorized remote access. SSH = 22, RDP = 3389, SNMP = 161." },

// -- Question 243: Troubleshooting (BSOD PAGE_FAULT = RAM) --
{ id:243, d:5, obj:"5.1", q:"A BSOD displays 'PAGE_FAULT_IN_NONPAGED_AREA' after installing new RAM. What should the tech do FIRST?",
o:["Run chkdsk on the system drive","Run a memory diagnostic tool","Reinstall the operating system","Replace the motherboard"], c:1,
ex:"PAGE_FAULT = memory issue. The word 'PAGE' refers to memory pages, not disk pages. Run memtest86 or Windows Memory Diagnostic first. chkdsk checks disk — wrong tool for a memory error." },

// -- Question 244: Networking (IMAPS + SMTP STARTTLS ports) --
{ id:244, d:2, obj:"2.1", q:"A company email server uses IMAPS for receiving and SMTP with STARTTLS for sending. Which port pair is in use?",
o:["110 and 25","143 and 465","993 and 587","995 and 465"], c:2,
ex:"IMAPS = 993 (encrypted IMAP receiving). SMTP with STARTTLS = 587 (encrypted sending). Port 110 = POP3 unencrypted. Port 143 = IMAP unencrypted. Port 25 = SMTP unencrypted." },

// -- Question 245: Networking (POP3S + implicit TLS ports) --
{ id:245, d:2, obj:"2.1", q:"Which secure email port pair uses POP3S for receiving and implicit TLS for sending?",
o:["993 and 587","995 and 587","995 and 465","143 and 25"], c:2,
ex:"POP3S = 995 (encrypted POP3 receiving). SMTPS = 465 (implicit TLS for sending). 587 uses STARTTLS (upgrade-based encryption). 993 is IMAPS, not POP3S." },

// -- Question 246: Mobile Devices (Exchange ActiveSync) --
{ id:246, d:1, obj:"1.3", q:"After configuring IMAP on a user's phone, email syncs but the calendar and contacts do not. Which protocol would resolve this?",
o:["POP3","SMTP","Exchange ActiveSync","SNMP"], c:2,
ex:"IMAP handles email only. Exchange ActiveSync is a push protocol that syncs email, contacts, AND calendar together. POP3 downloads email. SMTP sends. SNMP monitors network devices." },

// -- Question 247: Networking (APIPA address) --
{ id:247, d:2, obj:"2.6", q:"A technician sees a workstation with IP 169.254.12.50. What does this indicate?",
o:["The device is using a loopback address","The DHCP server is unavailable","The device has a valid static IP","The device is on a public network"], c:1,
ex:"169.254.x.x is an APIPA address — auto-assigned when no DHCP server responds. The device can communicate locally but NOT reach the internet. 127.x.x.x is loopback. APIPA ≠ static IP." },

// -- Question 248: Networking (private IPv4 ranges) --
{ id:248, d:2, obj:"2.6", q:"Which THREE address ranges are designated as private IPv4 address space? (Choose the correct set)",
o:["10.x.x.x, 127.x.x.x, 192.168.x.x","10.x.x.x, 172.16-31.x.x, 192.168.x.x","127.x.x.x, 169.254.x.x, 172.16-31.x.x","10.x.x.x, 169.254.x.x, 224.x.x.x"], c:1,
ex:"Private ranges: 10.0.0.0/8 (Class A), 172.16.0.0/12 (Class B), 192.168.0.0/16 (Class C). 127.x.x.x = loopback. 169.254.x.x = APIPA. 224.x.x.x = multicast." },

// -- Question 249: Networking (SNMP definition) --
{ id:249, d:2, obj:"2.1", q:"What does SNMP stand for, and what is it used for?",
o:["Simple Network Mail Protocol — sending email between servers","Simple Network Management Protocol — monitoring network devices","Secure Network Messaging Protocol — encrypted chat","Server Network Mapping Protocol — discovering network topology"], c:1,
ex:"SNMP = Simple Network Management Protocol. It monitors and manages switches, routers, and servers. Port 161 for queries (polling), port 162 for traps (alerts). Not related to email or messaging." },

// -- Question 250: Networking (MU-MIMO Wi-Fi 5) --
{ id:250, d:2, obj:"2.2", q:"MU-MIMO was first introduced as a downlink-only feature in which Wi-Fi standard?",
o:["802.11n (Wi-Fi 4)","802.11ac (Wi-Fi 5)","802.11ax (Wi-Fi 6)","802.11g"], c:1,
ex:"Wi-Fi 5 (802.11ac) introduced MU-MIMO but only for downlink (AP to devices). Wi-Fi 6 (802.11ax) upgraded it to work both directions AND added OFDMA. Wi-Fi 4 introduced basic MIMO (single user)." },

// -- 220-1201 Alignment: Additional questions for thin objectives --

// Domain 2.3: Services provided by networked hosts
{ id:251, d:2, obj:"2.3", q:"Which server role provides centralized authentication, authorization, and accounting for network access?",
o:["DNS server","DHCP server","AAA / RADIUS server","File server"], c:2,
ex:"AAA (Authentication, Authorization, Accounting) servers like RADIUS manage who can access the network and track their activity. DNS resolves names. DHCP assigns IPs." },
{ id:252, d:2, obj:"2.3", q:"A company needs centralized log collection from all network devices. Which server type should be deployed?",
o:["DNS server","Syslog server","DHCP server","Proxy server"], c:1,
ex:"Syslog servers collect and store log messages from routers, switches, firewalls, and servers in a central location for monitoring, analysis, and compliance." },
{ id:253, d:2, obj:"2.3", q:"Which network appliance distributes incoming client requests across multiple backend servers to prevent overload?",
o:["Proxy server","Load balancer","Spam gateway","DNS server"], c:1,
ex:"A load balancer distributes traffic across multiple servers for better performance and redundancy. If one server goes down, traffic shifts to the remaining servers." },
{ id:254, d:2, obj:"2.3", q:"Which server provides automatic time synchronization for all devices on a network?",
o:["DNS server","DHCP server","NTP server","Syslog server"], c:2,
ex:"NTP (Network Time Protocol) servers synchronize clocks across devices. Accurate time is critical for logging, authentication (Kerberos), and certificate validation." },
{ id:255, d:2, obj:"2.3", q:"A company wants to filter malicious emails before they reach employee inboxes. Which appliance should be deployed?",
o:["Load balancer","Spam gateway / email filter","Proxy server","NTP server"], c:1,
ex:"Spam gateways filter inbound email for spam, phishing, and malware before delivery to the mail server. They use reputation lists, content filtering, and sandboxing." },

// Domain 2.7: Internet connection types and network types
{ id:256, d:2, obj:"2.7", q:"Which internet connection type is MOST affected by high latency due to signal travel distance?",
o:["Fiber","Cable","DSL","Satellite"], c:3,
ex:"Satellite internet has ~600ms+ latency because signals travel to geostationary orbit (~35,000 km) and back. Fiber, cable, and DSL all have much lower latency." },
{ id:257, d:2, obj:"2.7", q:"Which network type covers a small area like a single room and connects personal devices?",
o:["LAN","WAN","PAN","MAN"], c:2,
ex:"PAN (Personal Area Network) covers ~10 meters and connects personal devices via Bluetooth, USB, or NFC. LAN covers a building. MAN covers a city. WAN covers large geographic areas." },
{ id:258, d:2, obj:"2.7", q:"A rural business has no access to cable or fiber internet. Which connection types are available? (Choose the best option)",
o:["Satellite or cellular (4G/5G)","Fiber only","Cable only","DSL only"], c:0,
ex:"In rural areas without wired infrastructure, satellite and cellular (4G/5G fixed wireless) are often the only broadband options. WISPs (Wireless ISPs) may also serve rural areas." },

// Domain 3.2: Cable types, connectors, features, purposes
{ id:259, d:3, obj:"3.2", q:"Which Ethernet cable category supports 10 Gbps speeds at distances up to 100 meters?",
o:["Cat 5","Cat 5e","Cat 6","Cat 6a"], c:3,
ex:"Cat 6a supports 10 Gbps at the full 100m distance. Cat 6 supports 10 Gbps only up to 55m. Cat 5e supports up to 1 Gbps. Cat 5 supports 100 Mbps." },
{ id:260, d:3, obj:"3.2", q:"Which fiber optic cable type is designed for long-distance transmissions using a single light path?",
o:["Multimode fiber","Single-mode fiber","Cat 6a","Coaxial"], c:1,
ex:"Single-mode fiber uses a narrow core (~9 microns) for a single light path, enabling distances of 10+ km. Multimode has a wider core for shorter runs (up to ~550m)." },
{ id:261, d:3, obj:"3.2", q:"A technician needs to connect a fiber optic patch cable. Which small form-factor connector is MOST commonly used in modern installations?",
o:["ST (Straight Tip)","SC (Subscriber Connector)","LC (Lucent Connector)","BNC"], c:2,
ex:"LC connectors are the most common modern fiber connector -- small form factor and used in high-density applications. ST is older (bayonet-style). SC is push-pull. BNC is for coaxial." },
{ id:262, d:3, obj:"3.2", q:"What is the maximum data transfer speed of USB 3.0 (SuperSpeed)?",
o:["480 Mbps","5 Gbps","10 Gbps","20 Gbps"], c:1,
ex:"USB 3.0 = 5 Gbps (SuperSpeed). USB 2.0 = 480 Mbps (Hi-Speed). USB 3.1 Gen 2 = 10 Gbps. USB 3.2 Gen 2x2 = 20 Gbps. USB4 = 40 Gbps." },

// Domain 3.7: Deploy/configure multifunction devices and printers
{ id:263, d:3, obj:"3.7", q:"A small office needs a device that can print, scan, copy, and fax. What type of device should be recommended?",
o:["Dedicated laser printer","Multifunction device (MFD/MFP)","Thermal printer","Dot matrix printer"], c:1,
ex:"A multifunction device (MFD/MFP) combines printing, scanning, copying, and faxing in one unit. More cost-effective and space-efficient than separate devices." },
{ id:264, d:3, obj:"3.7", q:"A network printer needs to be accessible to all users on the LAN. Which connection method is BEST for a shared office printer?",
o:["USB direct to one PC","Ethernet connection to the network switch","Parallel port","Serial cable"], c:1,
ex:"Ethernet connection allows all network users to print directly without routing through a single PC. USB requires sharing through a connected computer." },
{ id:265, d:3, obj:"3.7", q:"Which printing technology uses piezoelectric or thermal elements to spray liquid ink droplets onto paper?",
o:["Laser","Inkjet","Thermal","Impact"], c:1,
ex:"Inkjet printers use tiny nozzles to spray ink droplets. Piezoelectric inkjets (Epson) use crystal vibration; thermal inkjets (HP/Canon) heat ink to create bubbles that push droplets onto paper." },

// Domain 3.8: Printer maintenance
{ id:266, d:3, obj:"3.8", q:"A laser printer's maintenance kit is due for replacement. Which components are typically included?",
o:["Ink cartridges and print heads","Fuser, transfer roller, and pickup rollers","Thermal paper and ribbon","Impact ribbon and platen"], c:1,
ex:"Laser maintenance kits typically include the fuser assembly, transfer roller, pickup rollers, and separation pads. These wear items need periodic replacement at manufacturer-specified page counts." },
{ id:267, d:3, obj:"3.8", q:"An inkjet printer produces horizontal white lines across every page. Which maintenance step should be tried FIRST?",
o:["Replace the fuser","Run the print head cleaning utility","Replace the imaging drum","Calibrate the transfer roller"], c:1,
ex:"Horizontal white lines on inkjet output indicate clogged print head nozzles. Run the built-in cleaning utility (usually found in printer preferences). If it persists, manually clean or replace the print head." },
{ id:268, d:3, obj:"3.8", q:"A thermal receipt printer produces faded output. What maintenance should be performed?",
o:["Replace the toner cartridge","Clean the thermal print head with isopropyl alcohol","Replace the ink ribbon","Recalibrate the fuser temperature"], c:1,
ex:"Thermal printers have no ink or toner. Faded output is caused by residue on the thermal print head. Clean it with isopropyl alcohol and a lint-free cloth. Also check the thermal paper quality." },
{ id:269, d:2, obj:"2.5", q:"Which OSI layer do routers operate at?",
o:["Layer 1 - Physical","Layer 2 - Data Link","Layer 3 - Network","Layer 4 - Transport"], c:2,
ex:"Routers operate at Layer 3 (Network) and make forwarding decisions based on IP addresses. Switches = Layer 2 (MAC addresses). Hubs = Layer 1 (electrical signals only)." },
{ id:270, d:2, obj:"2.5", q:"A network switch forwards frames based on MAC addresses. At which OSI layer does it operate?",
o:["Layer 1","Layer 2","Layer 3","Layer 4"], c:1,
ex:"Switches operate at Layer 2 (Data Link) using MAC addresses. Routers = Layer 3 (IP addresses). Hubs = Layer 1 (no intelligence, just repeats signals)." },
{ id:271, d:2, obj:"2.5", q:"Which OSI layer is associated with hubs and physical cabling?",
o:["Layer 1 - Physical","Layer 2 - Data Link","Layer 3 - Network","Layer 7 - Application"], c:0,
ex:"Layer 1 (Physical) deals with electrical signals, cables, and hubs. Hubs just repeat signals with no intelligence. Think: Layer 1 = dumbest, Layer 7 = smartest." },
{ id:272, d:2, obj:"2.6", q:"A home router assigns addresses in the 192.168.1.x range. Which class of private network is this?",
o:["Class A","Class B","Class C","Class D"], c:2,
ex:"192.168.0.0/16 = Class C private (smallest range, home networks). 10.0.0.0/8 = Class A (largest). 172.16.0.0/12 = Class B (medium). Remember: A=10, B=172, C=192." },
{ id:273, d:2, obj:"2.6", q:"Which private IP range provides the MOST available host addresses?",
o:["192.168.0.0/16","172.16.0.0/12","10.0.0.0/8","169.254.0.0/16"], c:2,
ex:"10.0.0.0/8 = Class A = over 16 million addresses (largest private range). 172.16.0.0/12 = ~1 million. 192.168.0.0/16 = ~65,000. 169.254.x.x is APIPA, not a private range." },
{ id:274, d:1, obj:"1.2", q:"A technician needs to transfer a 2 GB file between two phones without a router or cellular data. Which technology provides the FASTEST transfer?",
o:["Bluetooth","NFC","Wi-Fi Direct","Infrared"], c:2,
ex:"Wi-Fi Direct creates a peer-to-peer Wi-Fi connection without needing a router -- full Wi-Fi speeds. Bluetooth is much slower for large files. NFC is tap-range only (good for pairing, not bulk transfer)." },
{ id:275, d:2, obj:"2.1", q:"Which secure email port pair uses IMAPS for receiving and STARTTLS for sending?",
o:["995 and 465","993 and 587","993 and 465","143 and 25"], c:1,
ex:"IMAPS = 993 (encrypted receiving via IMAP). SMTP STARTTLS = 587 (upgrade-to-encrypted sending). 995 = POP3S. 465 = SMTPS (implicit encryption). 143 and 25 are unencrypted." },
{ id:276, d:2, obj:"2.1", q:"Which secure email port pair uses POP3S for receiving and SMTPS with implicit encryption for sending?",
o:["993 and 587","995 and 465","995 and 587","110 and 25"], c:1,
ex:"POP3S = 995 (encrypted POP3 receiving). SMTPS = 465 (implicit TLS sending). 993 = IMAPS. 587 = STARTTLS. 110 and 25 are both unencrypted." },
{ id:277, d:5, obj:"5.1", q:"A newly built PC gives one long beep and three short beeps during POST. Based on common beep code patterns, which component should be checked FIRST?",
o:["RAM","CPU","Video/GPU","Power supply"], c:2,
ex:"One long beep + multiple short beeps typically indicates a video/GPU issue. Check that the GPU is seated properly and has power connected. Continuous short beeps = RAM. Single short beep = normal POST." },
{ id:278, d:2, obj:"2.6", q:"Match each private IP range to its class: 10.x.x.x, 172.16-31.x.x, 192.168.x.x",
o:["A, B, C","C, B, A","B, A, C","A, C, B"], c:0,
ex:"10.x.x.x = Class A (largest). 172.16-31.x.x = Class B (medium). 192.168.x.x = Class C (smallest). They go in order: A=10, B=172, C=192. Home routers typically use Class C (192.168.x.x)." },
];

const DOMAINS = [

function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

/* Question rotation: deprioritize recently seen questions so they alternate */
function loadRecentIds() {
  try { const r = localStorage.getItem("comptia-recent-ids"); return r ? JSON.parse(r) : []; } catch(e) { return []; }
}
function saveRecentIds(ids) {
  try { localStorage.setItem("comptia-recent-ids", JSON.stringify(ids)); } catch(e) {}
}
function pickRotated(pool, count) {
  const recent = new Set(loadRecentIds());
  const unseen = pool.filter(function(q) { return !recent.has(q.id); });
  const seen = pool.filter(function(q) { return recent.has(q.id); });
  /* prioritize unseen, fill remainder with seen (reshuffled) */
  const ordered = shuffle(unseen).concat(shuffle(seen));
  const picked = ordered.slice(0, count);
  /* record these as recently seen (keep last 2 sessions worth) */
  const newRecent = loadRecentIds().concat(picked.map(function(q) { return q.id; }));
  /* cap at 2x the pool size so old ones cycle back in */
  saveRecentIds(newRecent.slice(-Math.min(pool.length * 2, 120)));
  return shuffle(picked);
}
function fmt(s) { const m=Math.floor(s/60),sec=s%60; return m+":"+String(sec).padStart(2,"0"); }

const FRESH = { total:0, correct:0, guessed:0, ds:{1:{a:0,c:0,g:0},2:{a:0,c:0,g:0},3:{a:0,c:0,g:0},4:{a:0,c:0,g:0},5:{a:0,c:0,g:0}}, exams:[], sessions:[] };

function loadProgress() {
  try {
    const raw = localStorage.getItem("comptia-a-progress");
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.guessed === undefined) parsed.guessed = 0;
      if (!parsed.sessions) parsed.sessions = [];
      for (let i = 1; i <= 5; i++) {
        if (!parsed.ds[i]) parsed.ds[i] = {a:0,c:0,g:0};
        if (parsed.ds[i].g === undefined) parsed.ds[i].g = 0;
      }
      return parsed;
    }
  } catch(e) {
    console.log("No saved progress found, starting fresh");
  }
  return null;
}

function saveProgress(p) {
  try {
    localStorage.setItem("comptia-a-progress", JSON.stringify(p));
  } catch(e) {
    console.error("Failed to save progress:", e);
  }
}

/* ---- GitHub Gist Cloud Sync ---- */
const GIST_FILENAME = "comptia-a-progress.json";
const GIST_DESC = "CompTIA A+ Study Hub - Cloud Progress Sync";

function getGistToken() {
  try { return localStorage.getItem("comptia-gist-token") || ""; } catch(e) { return ""; }
}
function setGistToken(t) {
  try { localStorage.setItem("comptia-gist-token", t); } catch(e) {}
}
function getGistId() {
  try { return localStorage.getItem("comptia-gist-id") || ""; } catch(e) { return ""; }
}
function setGistId(id) {
  try { localStorage.setItem("comptia-gist-id", id); } catch(e) {}
}

function mergeProgress(local, remote) {
  /* Take the version with more total answers as the base, then merge in unique sessions */
  if (!remote) return local;
  if (!local) return remote;
  var base = local.total >= remote.total ? JSON.parse(JSON.stringify(local)) : JSON.parse(JSON.stringify(remote));
  var other = local.total >= remote.total ? remote : local;
  /* Merge sessions: add any sessions from 'other' not already in 'base' by checking date+total+correct */
  if (other.sessions && other.sessions.length > 0) {
    if (!base.sessions) base.sessions = [];
    var existing = new Set(base.sessions.map(function(s) { return s.date + "|" + s.total + "|" + s.correct; }));
    other.sessions.forEach(function(s) {
      var key = s.date + "|" + s.total + "|" + s.correct;
      if (!existing.has(key)) base.sessions.push(s);
    });
  }
  /* Merge exams similarly */
  if (other.exams && other.exams.length > 0) {
    if (!base.exams) base.exams = [];
    var existingExams = new Set(base.exams.map(function(e) { return e.date + "|" + e.score; }));
    other.exams.forEach(function(e) {
      var key = e.date + "|" + e.score;
      if (!existingExams.has(key)) base.exams.push(e);
    });
  }
  /* Use highest totals per domain */
  for (var i = 1; i <= 5; i++) {
    if (other.ds[i] && base.ds[i]) {
      if (other.ds[i].a > base.ds[i].a) {
        base.ds[i] = JSON.parse(JSON.stringify(other.ds[i]));
      }
    }
  }
  /* Use highest overall totals */
  if (other.total > base.total) { base.total = other.total; base.correct = other.correct; base.guessed = other.guessed || 0; }
  return base;
}

async function gistPush(token, gistId, progress) {
  var body = { description: GIST_DESC, files: {} };
  body.files[GIST_FILENAME] = { content: JSON.stringify(progress, null, 2) };
  if (gistId) {
    var res = await fetch("https://api.github.com/gists/" + gistId, {
      method: "PATCH", headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (res.ok) return await res.json();
    if (res.status === 404) { /* gist deleted, create new */ }
    else throw new Error("Gist update failed: " + res.status);
  }
  /* Create new gist */
  body.public = false;
  var res2 = await fetch("https://api.github.com/gists", {
    method: "POST", headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!res2.ok) throw new Error("Gist create failed: " + res2.status);
  var data = await res2.json();
  setGistId(data.id);
  return data;
}

async function gistPull(token, gistId) {
  if (!gistId) return null;
  var res = await fetch("https://api.github.com/gists/" + gistId, {
    headers: { "Authorization": "Bearer " + token }
  });
  if (res.status === 404) { setGistId(""); return null; }
  if (!res.ok) throw new Error("Gist fetch failed: " + res.status);
  var data = await res.json();
  var file = data.files[GIST_FILENAME];
  if (!file) return null;
  return JSON.parse(file.content);
}

async function findExistingGist(token) {
  var res = await fetch("https://api.github.com/gists?per_page=30", {
    headers: { "Authorization": "Bearer " + token }
  });
  if (!res.ok) throw new Error("Failed to list gists: " + res.status);
  var gists = await res.json();
  for (var i = 0; i < gists.length; i++) {
    if (gists[i].files[GIST_FILENAME]) {
      setGistId(gists[i].id);
      return gists[i].id;
    }
  }
  return null;
}

function CopyProgress({ prog }) {
  const [copied, setCopied] = useState(false);

  function buildReport() {
    const pct = prog.total > 0 ? Math.round((prog.correct/prog.total)*100) : 0;
    const gTotal = prog.guessed || 0;
    const knownC = prog.correct - (prog.guessed || 0);
    const knownT = prog.total - gTotal;
    const realPct = knownT > 0 ? Math.round((knownC/knownT)*100) : 0;
    let txt = "CompTIA A+ 220-1201 Progress Report\n";
    txt += "Total: " + prog.correct + "/" + prog.total + " (" + pct + "%)\n";
    if (gTotal > 0) txt += "Guessed: " + gTotal + " | Real accuracy (no guesses): " + realPct + "%\n";
    txt += "\nDomain Breakdown:\n";
    DOMAINS.forEach(function(d) {
      const ds = prog.ds[d.id];
      const dp = ds.a > 0 ? Math.round((ds.c/ds.a)*100) : 0;
      const gn = ds.g || 0;
      txt += d.icon + " " + d.name + " (" + d.w + "): " + ds.c + "/" + ds.a + " " + (ds.a > 0 ? "(" + dp + "%)" : "(not started)") + (gn > 0 ? " [" + gn + " guessed]" : "") + "\n";
    });
    if (prog.exams.length > 0) {
      txt += "\nExam History:\n";
      prog.exams.forEach(function(e) {
        txt += e.date + ": " + e.score + "/900 " + (e.pass ? "PASS" : "FAIL") + " (" + e.c + "/" + e.t + ")\n";
      });
    }
    if (prog.sessions && prog.sessions.length > 0) {
      txt += "\nLast 5 Sessions:\n";
      prog.sessions.slice(-5).reverse().forEach(function(s) {
        const label = s.mode === "exam" ? "Exam" : s.domain ? DOMAIN_NAMES[s.domain] : "All domains";
        txt += s.date + " " + label + ": " + s.correct + "/" + s.total + "\n";
      });
    }
    return txt;
  }

  function handleCopy() {
    const text = buildReport();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        setCopied(true);
        setTimeout(function() { setCopied(false); }, 2000);
      }).catch(function() {
        fallbackCopy(text);
      });
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    setCopied(true);
    setTimeout(function() { setCopied(false); }, 2000);
  }

  return (
    <button onClick={handleCopy} style={{ width:"100%", marginTop:28, padding:"14px", background: copied ? "#34d39915" : "#111", border:"1px solid " + (copied ? "#34d39944" : "#1a1a1a"), borderRadius:8, color: copied ? "#34d399" : "#aaa", fontSize:13, fontWeight:600, cursor:"pointer", transition:"all 0.2s" }}>
      {copied ? "\u2713 Copied! Paste it in our chat" : "\u{1F4CB} Copy Progress -- paste to Claude"}
    </button>
  );
}

function copyText(text, setCopied) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      setCopied(true); setTimeout(function() { setCopied(false); }, 2500);
    }).catch(function() { copyFallback(text, setCopied); });
  } else { copyFallback(text, setCopied); }
}
function copyFallback(text, setCopied) {
  var ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.left = "-9999px";
  document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
  setCopied(true); setTimeout(function() { setCopied(false); }, 2500);
}

function buildFullResultsText(results, sessionMode, sessionDomain, sessionDate) {
  var correct = results.filter(function(r) { return r.correct; }).length;
  var total = results.length;
  var pct = Math.round((correct / Math.max(total, 1)) * 100);
  var guessedCount = results.filter(function(r) { return r.guessed; }).length;

  var txt = "=== SESSION RESULTS ===\n";
  txt += "Date: " + (sessionDate || new Date().toLocaleDateString()) + "\n";
  var modeLabel = sessionMode === "exam" ? "Practice Exam" : "Study";
  txt += "Mode: " + modeLabel;
  if (sessionMode === "study" && sessionDomain) txt += " | Domain: " + DOMAIN_NAMES[sessionDomain];
  if (sessionMode === "study" && !sessionDomain) txt += " | All Domains";
  txt += "\n";
  txt += "Score: " + correct + "/" + total + " (" + pct + "%)\n";
  if (sessionMode === "exam") {
    var score = Math.round((correct / Math.max(total, 1)) * 900);
    txt += "Exam Score: " + score + "/900 " + (score >= 675 ? "PASS" : "FAIL") + "\n";
  }
  if (guessedCount > 0) {
    var knownC = results.filter(function(r) { return r.correct && !r.guessed; }).length;
    var knownT = results.filter(function(r) { return !r.guessed; }).length;
    txt += "Guessed: " + guessedCount + " | Real accuracy (no guesses): " + knownC + "/" + knownT + " (" + (knownT > 0 ? Math.round((knownC/knownT)*100) : 0) + "%)\n";
  }

  // Domain breakdown
  txt += "\nDomain Breakdown:\n";
  DOMAINS.forEach(function(d) {
    var dr = results.filter(function(r) { return r.d === d.id; });
    if (dr.length === 0) return;
    var dc = dr.filter(function(r) { return r.correct; }).length;
    var dg = dr.filter(function(r) { return r.guessed; }).length;
    var dp = Math.round((dc / dr.length) * 100);
    txt += d.icon + " " + d.name + ": " + dc + "/" + dr.length + " (" + dp + "%)";
    if (dg > 0) txt += " [" + dg + " guessed]";
    txt += "\n";
  });

  // Full Q&A
  txt += "\n--- ALL QUESTIONS & ANSWERS ---\n";
  results.forEach(function(r, idx) {
    var q = QUESTIONS.find(function(x) { return x.id === r.id; });
    if (!q) return;
    txt += "\n" + (idx + 1) + ". [" + DOMAIN_NAMES[q.d] + " " + q.obj + "] " + q.q + "\n";
    txt += "   Your answer: " + q.o[r.picked];
    if (r.correct) {
      txt += " -- CORRECT";
    } else {
      txt += " -- INCORRECT\n   Correct answer: " + q.o[q.c];
    }
    if (r.guessed) txt += " [GUESSED]";
    txt += "\n";
    if (r.comment) txt += "   Your note: " + r.comment + "\n";
    txt += "   Explanation: " + q.ex + "\n";
  });

  txt += "\n=== PASTE TO CLAUDE FOR STUDY SUGGESTIONS & NEW QUESTIONS ===\n";
  return txt;
}

function CopySessionResults({ results, mode, domain, label, date }) {
  var btnLabel = label || "Copy Session Results -- paste to Claude";
  var copiedLabel = label ? "\u2713 Copied!" : "\u2713 Copied! Paste it in our chat";
  const [copied, setCopied] = useState(false);
  return (
    <button onClick={function() { copyText(buildFullResultsText(results, mode, domain, date), setCopied); }}
      style={{ width:"100%", padding:"14px", background: copied ? "#34d39915" : "#111", border:"1px solid " + (copied ? "#34d39944" : "#60a5fa44"), borderRadius:8, color: copied ? "#34d399" : "#60a5fa", fontSize:13, fontWeight:600, cursor:"pointer", transition:"all 0.2s", marginBottom:8 }}>
      {copied ? copiedLabel : "\u{1F4CB} " + btnLabel}
    </button>
  );
}
